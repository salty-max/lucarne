name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - run: bun install --frozen-lockfile

      # Run all four even when an early one fails: one red push should tell you
      # everything that is broken, not just the first thing.
      - run: bun run typecheck
        if: '!cancelled()'
      - run: bun run lint
        if: '!cancelled()'
      - run: bun run test
        if: '!cancelled()'
      - run: bun run build
        if: '!cancelled()'

  # The deploy scripts are infrastructure now — a typo in them surfaces during a
  # recovery, which is the worst possible moment. shellcheck would have caught
  # the bash-4-only mapfile that broke rotation outside the VM.
  shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck
          shellcheck --severity=warning scripts/*.sh
