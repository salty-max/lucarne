  </defs>
  <rect width="512" height="512" fill="#05080f"/>
  <rect x="152" y="136" width="64" height="224" fill="#14ffff"/>
  <rect x="152" y="296" width="176" height="64" fill="#14ffff"/>
  <rect x="342" y="296" width="64" height="64" fill="#14ff14"/>
