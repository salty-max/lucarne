<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lucarne — football schedule & broadcasters</title>
    <meta
      name="description"
      content="Football fixtures across Ligue 1, Premier League, La Liga, Bundesliga, the European cups and the World Cup, with the French broadcaster for every match."
    />
    <script>
      // Set the theme before first paint (no flash). Stored choice wins, else OS.
      (function () {
        try {
          var t = localStorage.getItem("theme");
          var dark = t ? t === "dark" : window.matchMedia("(prefers-color-scheme: dark)").matches;
          document.documentElement.classList.toggle("dark", dark);
        } catch (e) {
          document.documentElement.classList.add("dark");
        }
      })();
      // Apply the CRT-off setting before first paint (no flash).
      (function () {
        try {
          var s = JSON.parse(localStorage.getItem("lucarne:settings") || "{}");
          if (s.crt === false) document.documentElement.classList.add("crt-off");
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
