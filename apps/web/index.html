<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Lucarne — football schedule & broadcasters</title>
    <meta
      name="description"
      content="Football fixtures across Ligue 1, Premier League, La Liga, Bundesliga, the European cups and the World Cup, with the French broadcaster for every match."
    />
    <!-- PWA / installed-app chrome -->
    <meta name="theme-color" content="#05080f" />
    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <link rel="icon" href="/favicon-32.png" sizes="32x32" type="image/png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Lucarne" />
    <script>
      // Set the theme before first paint (no flash). Stored choice wins, else OS.
      (function () {
        try {
          var t = localStorage.getItem("theme");
          var dark = t ? t === "dark" : window.matchMedia("(prefers-color-scheme: dark)").matches;
          document.documentElement.classList.toggle("dark", dark);
        } catch (e) {
          document.documentElement.classList.add("dark");
        }
      })();
      // Apply the CRT-off setting + language before first paint (no flash).
      (function () {
        try {
          var s = JSON.parse(
            localStorage.getItem("lucarne:prefs") || localStorage.getItem("lucarne:settings") || "{}",
          );
          if (s.crt === false) document.documentElement.classList.add("crt-off");
          document.documentElement.lang = s.lang === "en" ? "en" : "fr";
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
