<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Lucarne — football schedule & broadcasters</title>
    <meta
      name="description"
      content="Football fixtures across Ligue 1, Premier League, La Liga, Bundesliga, the European cups and the World Cup, with the French broadcaster for every match."
    />
    <!-- PWA / installed-app chrome -->
    <meta name="theme-color" content="#05080f" />
    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <link rel="icon" href="/favicon-32.png" sizes="32x32" type="image/png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Lucarne" />

    <!-- iOS native launch screens — one per common iPhone resolution (portrait) -->
    <link rel="apple-touch-startup-image" media="screen and (device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" href="/splash/apple-splash-se.png" />
    <link rel="apple-touch-startup-image" media="screen and (device-width: 414px) and (device-height: 736px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" href="/splash/apple-splash-plus.png" />
    <link rel="apple-touch-startup-image" media="screen and (device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" href="/splash/apple-splash-x.png" />
    <link rel="apple-touch-startup-image" media="screen and (device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" href="/splash/apple-splash-xr.png" />
    <link rel="apple-touch-startup-image" media="screen and (device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" href="/splash/apple-splash-xsmax.png" />
    <link rel="apple-touch-startup-image" media="screen and (device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" href="/splash/apple-splash-i12.png" />
    <link rel="apple-touch-startup-image" media="screen and (device-width: 428px) and (device-height: 926px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" href="/splash/apple-splash-i12promax.png" />
    <link rel="apple-touch-startup-image" media="screen and (device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" href="/splash/apple-splash-i14pro.png" />
    <link rel="apple-touch-startup-image" media="screen and (device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" href="/splash/apple-splash-i14promax.png" />
    <link rel="apple-touch-startup-image" media="screen and (device-width: 402px) and (device-height: 874px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" href="/splash/apple-splash-i16pro.png" />
    <link rel="apple-touch-startup-image" media="screen and (device-width: 440px) and (device-height: 956px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" href="/splash/apple-splash-i16promax.png" />

    <style>
      /* Boot splash — painted from the very first frame so the app never opens on
         a white screen; faded out by main.tsx once the shell mounts. */
      html {
        background: #05080f;
      }
      /* The teletext face, inlined here so the splash wordmark renders in it
         before the app's CSS loads (same file the app's font pref uses). */
      @font-face {
        font-family: "Teletext50";
        src: url("/fonts/teletext50-condensed.woff2") format("woff2");
        font-display: block;
      }
      #splash {
        position: fixed;
        inset: 0;
        z-index: 2147483647;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        background: #05080f;
        transition: opacity 0.35s ease;
      }
      #splash.splash-hide {
        opacity: 0;
        pointer-events: none;
      }
      .splash-inner {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 22px;
        animation: splashPulse 1.6s ease-in-out infinite;
      }
      #splash svg {
        width: 84px;
        height: 84px;
        filter: drop-shadow(0 0 7px rgba(20, 255, 255, 0.55));
      }
      .splash-word {
        font-family: "Teletext50", "Cascadia Mono", monospace;
        font-size: 32px;
        letter-spacing: 0.5em;
        text-indent: 0.5em;
        color: #14ffff;
        text-shadow: 0 0 8px rgba(20, 255, 255, 0.6);
      }
      /* CRT: scanlines over everything, plus a soft vignette. */
      #splash::after {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        background: repeating-linear-gradient(
          to bottom,
          rgba(0, 0, 0, 0) 0,
          rgba(0, 0, 0, 0) 2px,
          rgba(0, 0, 0, 0.3) 2px,
          rgba(0, 0, 0, 0.3) 3px
        );
      }
      #splash::before {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        background: radial-gradient(
          ellipse at center,
          rgba(0, 0, 0, 0) 55%,
          rgba(0, 0, 0, 0.55) 100%
        );
      }
      @keyframes splashPulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.55;
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .splash-inner {
          animation: none;
        }
      }
    </style>
    <script>
      // Set the theme before first paint (no flash). Stored choice wins, else OS.
      (function () {
        try {
          var t = localStorage.getItem("theme");
          var dark = t ? t === "dark" : window.matchMedia("(prefers-color-scheme: dark)").matches;
          document.documentElement.classList.toggle("dark", dark);
        } catch (e) {
          document.documentElement.classList.add("dark");
        }
      })();
      // Apply the CRT-off setting + language before first paint (no flash).
      (function () {
        try {
          var s = JSON.parse(
            localStorage.getItem("lucarne:prefs") || localStorage.getItem("lucarne:settings") || "{}",
          );
          if (s.crt === false) document.documentElement.classList.add("crt-off");
          document.documentElement.lang = s.lang === "en" ? "en" : "fr";
          document.documentElement.setAttribute("data-theme", s.theme || "cept1");
          if (s.font !== "modern") document.documentElement.classList.add("font-retro");
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="splash" aria-hidden="true">
      <div class="splash-inner">
        <svg viewBox="127 98 300 300" xmlns="http://www.w3.org/2000/svg">
          <rect x="152" y="136" width="64" height="224" fill="#14ffff" />
          <rect x="152" y="296" width="176" height="64" fill="#14ffff" />
          <rect x="342" y="296" width="64" height="64" fill="#14ff14" />
        </svg>
        <div class="splash-word">LUCARNE</div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
